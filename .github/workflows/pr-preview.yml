name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: preview
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run tests
        run: node test.js

  deploy-preview:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to /test/
        run: |
          rm -rf gh-pages/test
          mkdir -p gh-pages/test
          rsync -a --exclude='.git' --exclude='gh-pages' . gh-pages/test/
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Deploy PR #${{ github.event.pull_request.number }} preview to /test/"
          git push
