name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: preview
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dev dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm test

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: test-results/

  deploy-preview:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy to /test/
        run: |
          rm -rf gh-pages/test
          mkdir -p gh-pages/test
          rsync -a --exclude='.git' --exclude='gh-pages' . gh-pages/test/
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          # Escape HTML special characters in PR title
          PR_TITLE="${PR_TITLE//&/&amp;}"
          PR_TITLE="${PR_TITLE//</&lt;}"
          PR_TITLE="${PR_TITLE//>/&gt;}"
          PR_TITLE="${PR_TITLE//\"/&quot;}"
          sed -i "s|<div id=\"pr-preview-banner\"></div>|<div id=\"pr-preview-banner\">Preview av <a href=\"${PR_URL}\">#${PR_NUM}: ${PR_TITLE}</a></div>|" gh-pages/test/index.html
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Deploy PR #${{ github.event.pull_request.number }} preview to /test/"
          git push

      - name: Comment preview link on PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- pr-preview-comment -->';
            const body = `${marker}\n🔗 **Preview:** https://chaerem.github.io/Plongster/test/`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
