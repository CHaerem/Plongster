<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Music note -->
  <g transform="translate(96,96)">
    <!-- Disc -->
    <circle cx="0" cy="12" r="38" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.3"/>
    <circle cx="0" cy="12" r="24" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.2"/>
    <circle cx="0" cy="12" r="8" fill="url(#accent)" opacity="0.5"/>
    <!-- Note stem -->
    <rect x="8" y="-48" width="5" height="60" rx="2.5" fill="url(#accent)"/>
    <!-- Note flag -->
    <path d="M13,-48 Q36,-42 30,-28 Q24,-18 13,-22" fill="url(#accent)"/>
    <!-- Note head -->
    <ellipse cx="-2" cy="14" rx="14" ry="10" transform="rotate(-20)" fill="url(#accent)"/>
  </g>
  <!-- PLONGSTER text -->
  <text x="96" y="162" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="16" letter-spacing="2" fill="url(#accent)">PLONGSTER</text>
</svg>
