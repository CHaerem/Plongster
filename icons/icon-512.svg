<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Music note -->
  <g transform="translate(256,240)">
    <!-- Disc rings -->
    <circle cx="0" cy="20" r="100" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.2"/>
    <circle cx="0" cy="20" r="70" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.15"/>
    <circle cx="0" cy="20" r="40" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.1"/>
    <circle cx="0" cy="20" r="16" fill="url(#accent)" opacity="0.4"/>
    <!-- Note stem -->
    <rect x="20" y="-130" width="10" height="155" rx="5" fill="url(#accent)"/>
    <!-- Note flag -->
    <path d="M30,-130 Q80,-115 70,-80 Q60,-50 30,-60" fill="url(#accent)"/>
    <!-- Note head -->
    <ellipse cx="-8" cy="28" rx="36" ry="26" transform="rotate(-20, -8, 28)" fill="url(#accent)"/>
  </g>
  <!-- PLONGSTER text -->
  <text x="256" y="430" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="46" letter-spacing="5" fill="url(#accent)">PLONGSTER</text>
</svg>
