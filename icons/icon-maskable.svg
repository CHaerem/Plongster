<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1DB954"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Full background (maskable safe zone = 80% center) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Music note - centered in safe zone (roughly 80% = 410px centered) -->
  <g transform="translate(256,230)">
    <!-- Disc rings -->
    <circle cx="0" cy="16" r="80" fill="none" stroke="url(#accent)" stroke-width="5" opacity="0.2"/>
    <circle cx="0" cy="16" r="55" fill="none" stroke="url(#accent)" stroke-width="4" opacity="0.15"/>
    <circle cx="0" cy="16" r="14" fill="url(#accent)" opacity="0.4"/>
    <!-- Note stem -->
    <rect x="16" y="-100" width="8" height="120" rx="4" fill="url(#accent)"/>
    <!-- Note flag -->
    <path d="M24,-100 Q65,-88 56,-60 Q48,-38 24,-46" fill="url(#accent)"/>
    <!-- Note head -->
    <ellipse cx="-6" cy="22" rx="28" ry="20" transform="rotate(-20, -6, 22)" fill="url(#accent)"/>
  </g>
  <!-- PLONGSTER text -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="40" letter-spacing="4" fill="url(#accent)">PLONGSTER</text>
</svg>
